---
# =============================================================================
# 1. Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard

---
# =============================================================================
# 2. ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ocp-health-sa
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard

---
# =============================================================================
# 3. RBAC — Minimum-privilege roles  (replaces cluster-admin)
#
# SECURITY DESIGN RATIONALE
# ─────────────────────────
# cluster-admin was used previously because it was the simplest path. In
# production that violates the principle of least privilege. The dashboard
# performs almost entirely READ operations. The only write operation is
# `oc create token` — a single, scoped, time-limited token creation in the
# openshift-monitoring namespace.
#
# The approach below uses THREE RBAC objects instead of cluster-admin:
#
#  A. ocp-health-reader  (ClusterRole)
#     Read-only access to the cluster-scoped and cross-namespace resources
#     the dashboard actually queries.  No write permissions.
#
#  B. ocp-health-clusterrole-binding  (ClusterRoleBinding)
#     Binds the ClusterRole above to the ServiceAccount.
#
#  C. ocp-health-token-creator  (Role, namespace: openshift-monitoring)
#     Grants ONLY `create` on `serviceaccounts/token` for prometheus-k8s.
#     This is the single write the dashboard needs for Thanos auth.
#     Scoped to one namespace and one sub-resource — not cluster-wide.
#
#  D. ocp-health-token-creator-binding  (RoleBinding, openshift-monitoring)
#     Binds C above.
#
# WHAT IS STILL READ-ONLY?
# ─────────────────────────
# • clusteroperators, clusterversions, machineconfigpools   (config / mco APIs)
# • nodes, pods, secrets, pvcs, resourcequotas              (core API)
# • poddisruptionbudgets                                    (policy API)
# • routes                                                  (route.openshift.io)
# • namespaces                                              (core API)
# • pods/exec (etcd health check only)                      (core API sub-resource)
# • nodes/metrics (oc adm top nodes)                        (metrics.k8s.io)
#
# WHAT IS cluster-admin ABSOLUTELY MANDATORY FOR?
# ─────────────────────────────────────────────────
# Nothing — the custom role below covers every operation the dashboard uses.
# If you later add checks that require write access (e.g., remediations),
# re-evaluate and scope them as additional Roles in specific namespaces.
#
# HOW TO SWITCH FROM cluster-admin
# ──────────────────────────────────
# 1. Delete the old ClusterRoleBinding:
#      oc delete clusterrolebinding ocp-health-dashboard-cluster-admin
# 2. Apply this manifest section:
#      oc apply -f k8s/manifests.yaml
# =============================================================================

# ── A. Minimum-privilege ClusterRole ─────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocp-health-reader
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
rules:
  # ── Core API (v1) ────────────────────────────────────────────────────────
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - persistentvolumeclaims
      - secrets
      - resourcequotas
      - serviceaccounts
    verbs: ["get", "list"]

  # pods/exec — needed only for etcd health check
  # (`oc exec etcdctl endpoint health --cluster` in openshift-etcd)
  # If you disable the etcd_health check, remove this rule.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

  # ── Metrics API — required for `oc adm top nodes` ─────────────────────
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

  # ── Policy API — PodDisruptionBudgets ──────────────────────────────────
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]

  # ── OpenShift config APIs ──────────────────────────────────────────────
  - apiGroups: ["config.openshift.io"]
    resources:
      - clusteroperators
      - clusterversions
    verbs: ["get", "list"]

  # ── MachineConfig operator ─────────────────────────────────────────────
  - apiGroups: ["machineconfiguration.openshift.io"]
    resources: ["machineconfigpools"]
    verbs: ["get", "list"]

  # ── Routes (Thanos host discovery, console URL) ────────────────────────
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]

---
# ── B. Bind ClusterRole to the ServiceAccount ────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ocp-health-reader-binding
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
subjects:
  - kind: ServiceAccount
    name: ocp-health-sa
    namespace: ocp-health-dashboard
roleRef:
  kind: ClusterRole
  name: ocp-health-reader
  apiGroup: rbac.authorization.k8s.io

---
# ── C. Scoped Role — token creation for Thanos auth (openshift-monitoring)
# This is the ONLY write permission the dashboard requires and it is
# deliberately confined to one namespace and one sub-resource.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ocp-health-token-creator
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["prometheus-k8s"]   # ← scoped to only this SA
    verbs: ["create"]

---
# ── D. Bind the Role to the ServiceAccount ───────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ocp-health-token-creator-binding
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
subjects:
  - kind: ServiceAccount
    name: ocp-health-sa
    namespace: ocp-health-dashboard
roleRef:
  kind: Role
  name: ocp-health-token-creator
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# 4. ConfigMap — environment configuration
#    Edit values here and restart the pod to apply changes.
#    To disable a specific check, add CHECK_<ID_UPPERCASE>=false
#    e.g.  CHECK_SSL_CERTIFICATES: "false"
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ocp-health-config
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
data:
  # ── Cluster endpoints ──────────────────────────────────────────────────────
  API_URL:        "https://api.ocp.example.com:6443"
  MCS_URL:        "https://api.ocp.example.com:22623"
  CONSOLE_URL:    "https://console-openshift-console.apps.ocp.example.com"
  CLUSTER_ID:     "my-ocp-cluster"

  # ── Schedule ───────────────────────────────────────────────────────────────
  # Override the YAML config schedule_hours via this env var
  SCHEDULE_HOURS: "12"
  # Or set a full cron expression (takes precedence over SCHEDULE_HOURS)
  # CRON_SCHEDULE: "0 6,18 * * *"
  RUN_ON_STARTUP: "true"

  # ── Thresholds ─────────────────────────────────────────────────────────────
  # These override the per-check threshold values in checks-config.yaml
  # (checks-config.yaml thresholds take effect if these env vars are absent)

  # ── Artifact retention ─────────────────────────────────────────────────────
  ARTIFACT_RETENTION_DAYS: "30"

  # ── Logging ────────────────────────────────────────────────────────────────
  LOG_LEVEL: "info"

  # ── Per-check overrides ────────────────────────────────────────────────────
  # Uncomment to disable individual checks without redeploying the image:
  # CHECK_SSL_CERTIFICATES: "false"
  # CHECK_NODE_CPU: "false"
  # CHECK_NON_PLATFORM_PODS: "false"

---
# =============================================================================
# 5. ConfigMap — checks-config.yaml (mounted as file)
#    Controls which checks run and in what order.
#    Modify and apply; restart the pod to pick up changes.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ocp-health-checks-config
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
data:
  checks-config.yaml: |
    schedule_hours: 12
    run_on_startup: true
    artifact_retention_days: 30

    categories:
      - control_plane
      - nodes
      - pods
      - networking
      - storage
      - security
      - monitoring

    checks:
      - id: cluster_operators
        name: Cluster Operators
        category: control_plane
        enabled: true

      - id: cluster_version
        name: Cluster Version
        category: control_plane
        enabled: true

      - id: machine_config_pool
        name: MachineConfigPool
        category: control_plane
        enabled: true

      - id: etcd_health
        name: Etcd Cluster Health
        category: control_plane
        enabled: true

      - id: authentication
        name: Authentication Pods
        category: control_plane
        enabled: true

      - id: control_plane_pods
        name: Control Plane Pods
        category: control_plane
        enabled: true

      - id: node_readiness
        name: Node Readiness
        category: nodes
        enabled: true

      - id: node_cpu
        name: Node CPU Usage
        category: nodes
        enabled: true
        threshold: 80

      - id: node_memory
        name: Node Memory Usage
        category: nodes
        enabled: true
        threshold: 80

      - id: platform_pods
        name: Platform Namespace Pods
        category: pods
        enabled: true

      - id: non_platform_pods
        name: Non-Platform Pods
        category: pods
        enabled: true

      - id: api_server
        name: API Server Health
        category: networking
        enabled: true

      - id: ingress_controller
        name: Ingress Controller Health
        category: networking
        enabled: true

      - id: machine_config_server
        name: Machine Config Server
        category: networking
        enabled: true

      - id: pvc_health
        name: PVC and PV Health
        category: storage
        enabled: true

      - id: ssl_certificates
        name: SSL Certificate Expiry
        category: security
        enabled: true
        threshold: 30

      - id: monitoring_stack
        name: Monitoring Stack
        category: monitoring
        enabled: true

---
# =============================================================================
# 5c. ConfigMap — Prometheus / Thanos metrics configuration
#     All thresholds are configurable here. Restart the pod after changes.
#
#     Discovery (auto unless overridden):
#       THANOS_HOST      — auto-discovered via: oc get route thanos-querier
#                          -n openshift-monitoring -o jsonpath='{.spec.host}'
#       METRICS_TOKEN_SA — ServiceAccount to create token for (default: prometheus-k8s)
#       METRICS_TOKEN_NS — Namespace of the SA (default: openshift-monitoring)
#
#     Token:
#       A short-lived token is created via `oc create token` and refreshed
#       every 9 minutes. No long-lived token or secret required.
#
#     Cache:
#       PROM_CACHE_SECS  — seconds to cache Thanos results (default: 300 = 5 min)
#
#     Thresholds:
#       PROM_CPU_THRESHOLD           — % CPU usage vs limit to flag a pod (default: 90)
#       PROM_MEM_THRESHOLD           — % memory limit to flag a pod (default: 80)
#       PROM_OOM_WINDOW              — look-back window for OOMKilled (default: 1h)
#       PROM_OOM_MIN_COUNT           — min OOMKill events to include (default: 1)
#       PROM_TOP_N                   — top N pods to return per query (default: 10)
#       PROM_PVC_THRESHOLD           — % PVC used to flag (default: 70)
#       PROM_FS_USED_THRESHOLD        — flag node FS if used% exceeds this (default: 90, i.e. free% < 10)
#       PROM_ETCD_DB_BYTES           — etcd DB bytes to flag (default: 8589934592 = 8 GB)
#       PROM_ETCD_RTT_MS             — etcd peer RTT p99 ms to flag (default: 100)
#       PROM_ALERT_SEVERITIES        — comma-separated severities to include (default: critical,warning)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ocp-health-metrics-config
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
data:
  # ── Thanos discovery (leave blank for auto-discovery) ─────────────────────
  THANOS_HOST:       ""
  METRICS_TOKEN_SA:  "prometheus-k8s"
  METRICS_TOKEN_NS:  "openshift-monitoring"
  PROM_CACHE_SECS:   "300"

  # ── Compute thresholds ────────────────────────────────────────────────────
  PROM_CPU_THRESHOLD:           "90"    # flag pods with CPU usage >= 90% of their CPU limit
  PROM_MEM_THRESHOLD:           "80"
  PROM_OOM_WINDOW:              "1h"
  PROM_OOM_MIN_COUNT:           "1"
  PROM_TOP_N:                   "10"

  # ── Storage thresholds ────────────────────────────────────────────────────
  PROM_PVC_THRESHOLD:           "70"    # flag PVCs using > 70% capacity
  PROM_FS_USED_THRESHOLD:       "90"    # flag filesystems with used% > 90% (i.e. free% < 10%)

  # ── etcd thresholds ───────────────────────────────────────────────────────
  PROM_ETCD_DB_BYTES:           "8589934592"   # 8 GB
  PROM_ETCD_RTT_MS:             "100"

  # ── Alert filter ──────────────────────────────────────────────────────────
  PROM_ALERT_SEVERITIES:        "critical,warning"

---
# =============================================================================
# 5d. ConfigMap — Resource Quota / Cluster Allocation configuration
#
#     RQ_SKIP_NAMESPACES  — comma-separated prefixes of namespaces to exclude
#                           from the ResourceQuota report.
#                           Default: openshift-,kube-,default
#
#     STORAGE CLASS COLUMNS ARE AUTO-DISCOVERED — NO CONFIG NEEDED
#     ─────────────────────────────────────────────────────────────
#     The dashboard scans all ResourceQuota .spec.hard keys for the pattern:
#       <scname>.storageclass.storage.k8s.io/requests.storage
#       <scname>.storageclass.storage.k8s.io/persistentvolumeclaims
#     Every unique SC name found across all quotas becomes a column group
#     (two sub-columns: Storage GiB + PVC count).
#
#     To onboard a new storage class:
#       1. Add the SC to your ResourceQuota definition as normal
#       2. Click "↻ Refresh" in the Cluster Allocation tab (or wait for cache)
#       3. The new SC columns appear automatically — no dashboard changes needed
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ocp-health-rq-config
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
data:
  # Namespace prefixes to exclude from the ResourceQuota report (platform namespaces).
  # Add your own namespace prefixes here, comma-separated.
  RQ_SKIP_NAMESPACES: "openshift-,kube-,default"

#     Controls which namespaces are EXCLUDED or INCLUDED in the SSL cert check.
#
#     SSL_EXCLUDE_NAMESPACES: comma-separated namespaces to skip (blacklist).
#       Default (if blank): the standard openshift internal namespaces below.
#       Add your own namespaces to this list, comma-separated.
#
#     SSL_INCLUDE_NAMESPACES: if set, ONLY these namespaces are checked (whitelist).
#       When this is set, SSL_EXCLUDE_NAMESPACES is ignored.
#       Leave blank to use exclusion mode instead.
#
#     SSL_CERT_THRESHOLD: days before expiry to flag as failing (default: 30).
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ocp-health-ssl-config
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
data:
  # Blacklist: namespaces to exclude from SSL cert checks
  # These are the standard OCP internal namespaces that manage their own certs
  SSL_EXCLUDE_NAMESPACES: >-
    openshift-compliance,
    openshift-kube-apiserver,
    openshift-kube-apiserver-operator,
    openshift-kube-controller-manager,
    openshift-kube-controller-manager-operator,
    openshift-kube-scheduler,
    openshift-operator-lifecycle-manager,
    openshift-config-managed

  # Whitelist mode: leave blank to use blacklist above.
  # Set to a comma-separated list to check ONLY those namespaces.
  # Example: "production,staging,my-apps"
  SSL_INCLUDE_NAMESPACES: ""

  # Days before expiry to flag a cert as expiring
  CERT_THRESHOLD: "30"


# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ocp-health-artifacts
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard   # uncomment and set your storage class

---
# =============================================================================
# 7. Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocp-health-dashboard
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
    app: ocp-health-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocp-health-dashboard
  template:
    metadata:
      labels:
        app: ocp-health-dashboard
        app.kubernetes.io/name: ocp-health-dashboard
    spec:
      serviceAccountName: ocp-health-sa
      automountServiceAccountToken: true

      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: dashboard
          # ── Update this image reference after build & push ──────────────
          image: image-registry.openshift-image-registry.svc:5000/ocp-health-dashboard/ocp-health-dashboard:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              protocol: TCP

          # ── Environment from ConfigMaps ──────────────────────────────────
          envFrom:
            - configMapRef:
                name: ocp-health-config
            - configMapRef:
                name: ocp-health-ssl-config
            - configMapRef:
                name: ocp-health-metrics-config
            - configMapRef:
                name: ocp-health-rq-config

          # ── Mount the checks-config YAML ────────────────────────────────
          env:
            - name: CONFIG_PATH
              value: /etc/ocp-health/checks-config.yaml

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
            - name: checks-config
              mountPath: /etc/ocp-health
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: ocp-health-artifacts
        - name: checks-config
          configMap:
            name: ocp-health-checks-config
        - name: tmp
          emptyDir: {}

      restartPolicy: Always

---
# =============================================================================
# 8. Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ocp-health-dashboard
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
spec:
  selector:
    app: ocp-health-dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP

---
# =============================================================================
# 9. Route — TLS edge termination
# =============================================================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ocp-health-dashboard
  namespace: ocp-health-dashboard
  labels:
    app.kubernetes.io/name: ocp-health-dashboard
spec:
  to:
    kind: Service
    name: ocp-health-dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
